<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
 
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
 
    <title>Kanapkowa karuzela</title>
 
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous"
    >
 
    <style>
        .carousel-item img {
            height: 550px;
            object-fit: cover;
        }
 
        .carousel-caption {
            background-color: rgba(0, 0, 0, 0.65);
            border-radius: 12px;
            padding: 20px;
        }
 
        @media (max-width: 768px) {
            .carousel-item img {
                height: 350px;
            }
        }
    </style>
</head>
 
<body class="bg-light">
 
    <main class="container py-5">
 
        <h1 class="text-center mb-4">Najlepsze kanapki</h1>
 
        <div
            id="sandwichCarousel"
            class="carousel slide carousel-fade shadow rounded overflow-hidden"
            data-bs-ride="carousel"
        >
 
            <!-- Wskaźniki slajdów -->
            <div class="carousel-indicators">
 
                <button
                    type="button"
                    data-bs-target="#sandwichCarousel"
                    data-bs-slide-to="0"
                    class="active"
                    aria-current="true"
                    aria-label="Kanapka 1"
                ></button>
 
                <button
                    type="button"
                    data-bs-target="#sandwichCarousel"
                    data-bs-slide-to="1"
                    aria-label="Kanapka 2"
                ></button>
 
                <button
                    type="button"
                    data-bs-target="#sandwichCarousel"
                    data-bs-slide-to="2"
                    aria-label="Kanapka 3"
                ></button>
 
            </div>
 
 
            <div class="carousel-inner">
 
                <!-- Slajd 1 -->
                <div class="carousel-item active" data-bs-interval="4000">
 
                    <img
                        src="https://cdn.gracza.pl/i/h/22/507573900.jpg"
                        class="d-block w-100"
                        alt="gra fabularna 16+"
                    >
 
                    <div class="carousel-caption d-none d-md-block">
 
                        <h2 class="h5">skyrim</h2>
 
                        <p>
                            gra fabularna 16+
                        </p>
 
                        <a href="#" class="btn btn-warning">
                            97zł
                        </a>
 
                    </div>
 
                </div>
 
                <!-- Slajd 2 -->
                <div class="carousel-item" data-bs-interval="4000">
 
                    <img
                        src="https://i.ytimg.com/vi/zowmaH7hc5Q/hqdefault.jpg"
                        class="d-block w-100"
                        alt="cętrum gier"
                    >
 
                    <div class="carousel-caption d-none d-md-block">
 
                        <h2 class="h5">roblox</h2>
 
                        <p>
                            cętrum gier
                        </p>
 
                        <a href="#" class="btn btn-warning">
                            darmowe
                        </a>
 
                    </div>
 
                </div>
 
                <!-- Slajd 3 -->
                <div class="carousel-item" data-bs-interval="4000">
 
                    <img
                        src="https://i.ytimg.com/vi/8ZFpPNrvJPE/hqdefault.jpg"
                        class="d-block w-100"
                        alt="meh arena gra szybka i dynamiczna"
                    >
 
                    <div class="carousel-caption d-none d-md-block">
 
                        <h2 class="h5">meharena</h2>
 
                        <p>
                            gra szybka i dynamiczna
                        </p>
 
                        <a href="#" class="btn btn-warning">
                            darmowe
                        </a>
 
                    </div>
 
                </div>
 
            </div>
 
            <!-- Przycisk poprzedniego slajdu -->
            <button
                class="carousel-control-prev"
                type="button"
                data-bs-target="#sandwichCarousel"
                data-bs-slide="prev"
            >
                <span
                    class="carousel-control-prev-icon"
                    aria-hidden="true"
                ></span>
 
                <span class="visually-hidden">
                    Poprzedni slajd
                </span>
            </button>
 
            <!-- Przycisk następnego slajdu -->
            <button
                class="carousel-control-next"
                type="button"
                data-bs-target="#sandwichCarousel"
                data-bs-slide="next"
            >
                <span
                    class="carousel-control-next-icon"
                    aria-hidden="true"
                ></span>
 
                <span class="visually-hidden">
                    Następny slajd
                </span>
            </button>
 
        </div>
 
    </main>
 
 
    <!-- Bootstrap 5.3.8 JavaScript Bundle -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
    ></script>
 
</body>
</html>
